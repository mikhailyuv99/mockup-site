<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup — Site éditable via CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main>
    <header class="hero" id="hero" role="banner">
      <div class="hero__bg">
        <div id="hero-media"></div>
      </div>
      <div class="hero__content">
        <h1 class="hero__title" id="hero-title"></h1>
        <p class="hero__subtitle" id="hero-subtitle"></p>
      </div>
    </header>

    <section class="about" id="about">
      <div class="about__grid">
        <div class="about__media">
          <div id="about-media"></div>
        </div>
        <div class="about__text">
          <h2 class="about__title" id="about-title"></h2>
          <p class="about__body" id="about-text"></p>
        </div>
      </div>
    </section>

    <section class="services" id="services">
      <h2 class="services__title" id="services-title"></h2>
      <div class="services__list" id="services-list"></div>
    </section>

    <section class="contact" id="contact">
      <h2 class="contact__title" id="contact-title"></h2>
      <p class="contact__text" id="contact-text"></p>
      <a class="contact__cta" href="#" id="contact-cta"></a>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
